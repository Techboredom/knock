[project]
name = "knock"
version = "1.0.0"
description = "Python web application for Wake-On-LAN node management"
authors = [{ name = "Developer", email = "dev@example.com" }]
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "flask>=2.3.0",
    "pyyaml>=6.0",
    "jwt>=2.3.0",
    "python-dotenv>=0.21.0",
    "psutil>=5.9.0",
]
dev-dependencies = [
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
    "black>=23.12.0",
    "flake8>=6.1.0",
    "mypy>=1.8.0",
    "pre-commit>=3.6.0",
]

[project.optional-dependencies]
all = ["knock[dev]"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
path = "."
targets.vsconfig.path = [".vs/launchSettings"]

[tool.black]
line-length = 100
target-version = ["py310", "py311", "py312"]

[tool.isort]
profile = "black"
line_length = 100

[tool.pytest.ini_options]
minversion = "7.0"
addopts = ["-v", "--cov", "knock"]
testpaths = ["tests"]
