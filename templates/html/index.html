<!DOCTYPE html>
<html lang="en">
<head></head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>Computer_Waker - WoL Management</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body></body>
    <div class="container">
        <header class="header">
            <h1><i class="fas fa-wifi"></i> Computer_Waker</h1>
            <p></p>Wake-On-LAN Node Management System</p>
            <div id="server-status">
                <span class="status-dot"></span>Connecting...
            </div>
        </header>

        <nav class="nav">
            <a href="#nodes" class="nav-link">Nodes</a>
            <a href="#interfaces" class="nav-link">Interfaces</a>
            <a href="/api/status" class="nav-link">Status</a>
        </nav>

        <main class="main">
            <section id="nodes" class="section">
                <div id="nodes-list" class="nodes-list">
                    <div class="card">
                        <h2><i class="fas fa-list"></i> Active Nodes <span id="node-count" class="node-count">0</span></h2>
                        <div id="toast"></div>
                        <table class="table" id="nodes-table">
                            <thead></thead>
                                <tr></tr>
                                    <th></th>
                                    <th></th>MAC Address</th>
                                    <th></th>State</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>

                        <div class="add-node-section">
                            <button id="add-node-button" class="btn btn-primary">
                                <i class="fas fa-plus"></i> Add New Node
                            </button>
                        </div>
                    </div>
                </div>
            </section>

            <section id="interfaces" class="section">
                <button id="refresh-button" class="btn btn-secondary">
                    <i class="fas fa-sync"></i> Refresh
                </button>
                <div class="card">
                    <h2><i class="fas fa-list"></i> Network Interfaces</h2>
                    <table class="table" id="interfaces-table">
                        <thead></thead>
                            <tr></tr>
                                <th>Name</th>
                                <th>Type</th>
                                <th></th>State</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </section>

            <section id="sleep-status" class="section">
                <button id="wake-single-button" class="btn btn-success">
                    <i class="fas fa-power-off"></i> Wake Single Node
                </button>
                <div class="card">
                    <h2><i class="fas fa-wifi"></i> Sleep Status</h2>
                    <div id="wake-status"></div>
                    <div id="sleep-confirm"></div>
                </div>
            </section>
        </main>

        <footer class="footer">
            <p>&copy; 2024 Computer_Waker</p>
        </footer>
    </div>

    <script type="text/javascript" src="/static/wol_manager.js"></script>
</body>
</html>
