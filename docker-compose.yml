version: "3.8"

services:
  wol-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: "computer-waker-wol"
    restart: unless-stopped
    network_mode: "host"
    ports: ["5000:5000"]
    environment:
      WOL_PORT: "5000"
      WOL_HOST: "0.0.0.0"
      FLASK_ENV: "production"
      PYTHONUNBUFFERED: "1"
    volumes:
      - "data:/app/data"
      - "security:/app/security"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
